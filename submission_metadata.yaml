ai_usage_summary: |
  Used Claude (Sonnet 4.6) and ChatGPT for coding assistance, debugging, architecture discussions, scoring audits, and review of ranking methodology. Candidate profiles were analyzed with AI assistance during feature validation and quality review. Final ranking logic, feature selection, implementation, and submission generation were performed by the participant.

methodology_summary: |
  Semantic retrieval pipeline using BAAI/bge-base-en-v1.5 embeddings with FAISS cosine-similarity search over 46,528 candidate profiles. Preprocessing removed consulting-only and honeypot candidates before embedding generation. Final ranking score combines 70% semantic similarity, 15% experience score (years of experience and job stability), and 15% behavior score (recruiter responsiveness, recent activity, notice period, GitHub activity, interview completion, and engagement signals). Precomputed embeddings enable end-to-end ranking in under 3 seconds on CPU. Reasoning strings are deterministic, candidate-specific, and generated only from profile facts.

